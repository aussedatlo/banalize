services:
  core:
    image: banalize-core:0.0.1-beta
    container_name: banalize-core
    restart: unless-stopped
    network_mode: "host"
    stop_grace_period: 30s
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      BANALIZE_CORE_FIREWALL_CHAIN: FORWARD
      BANALIZE_CORE_LOG_LEVEL: INFO
      BANALIZE_CORE_DATABASE_PATH: /var/lib/banalize
      BANALIZE_CORE_API_ADDR: 0.0.0.0:5040
      BANALIZE_CORE_GEOIP_AUTO_DOWNLOAD: "true"
      BANALIZE_CORE_CLEANER_INTERVAL: "30"
    volumes:
      - banalize-data:/var/lib/banalize

  ui:
    image: banalize-ui:0.0.1-beta
    container_name: banalize-ui
    restart: unless-stopped
    network_mode: "host"
    build:
      context: .
      dockerfile: apps/ui/Dockerfile
    depends_on:
      - core

volumes:
  banalize-data:
