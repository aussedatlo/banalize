version: 2
updates:
  # npm/pnpm workspace (root + apps/* + packages/*)
  # A single entry at the workspace root is required because the whole
  # monorepo shares one root pnpm-lock.yaml. Per-directory entries would
  # update the member package.json but leave the root lockfile untouched,
  # so CI fails on the out-of-sync lockfile.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      dev-dependencies:
        patterns:
          - "@banalize/*"
          - "prettier*"
          - "turbo"
          - "gitmoji*"
          - "eslint*"
          - "typescript*"
          - "stylelint*"
      radix:
        patterns:
          - "@radix-ui/*"

  # Rust/Cargo dependencies
  - package-ecosystem: "cargo"
    directory: "/apps/core"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "rust"
      - "core"
    groups:
      grpc-deps:
        patterns:
          - "tonic*"
          - "prost*"

  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
