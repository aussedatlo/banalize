name: Pull Request CI

on:
  pull_request:

# Cancel superseded runs for the same PR.
concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # `pnpm build` (turbo) compiles the Rust core too, so we need node + pnpm
      # + rust — proto provides all three from .prototools.
      - name: Setup proto tools
        uses: "moonrepo/setup-proto@v0"

      - name: Use proto tools and persist environment
        run: |
          proto use
          eval "$(proto activate)"
          echo "PATH=$PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run linters
        run: pnpm lint

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Check formatting
        run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck all packages
        run: pnpm -r typecheck

  core-test:
    name: Core test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.91.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/core

      - name: Run core e2e tests
        working-directory: apps/core
        run: cargo test --test e2e

  e2e:
    name: E2E test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.5
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browser
        run: pnpm --filter=@banalize/e2e exec playwright install --with-deps chromium

      # Pre-build the Docker images so the run stays within Playwright's
      # webServer start timeout (ubuntu-latest ships Docker + Compose v2).
      - name: Build e2e stack images
        run: docker compose -f docker-compose.e2e.yml build

      - name: Run Playwright e2e tests
        run: pnpm e2e test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report
          retention-days: 7
