name: Coverage CI

# Post-merge Rust coverage tracking on main. PRs are gated by pull-request.yml;
# this produces the coverage artifact, which that gate does not.
on:
  push:
    branches:
      - main

jobs:
  rust-coverage:
    name: Rust coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run e2e tests with coverage
        run: cargo llvm-cov --test e2e --lcov --output-path lcov.info

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: lcov.info
