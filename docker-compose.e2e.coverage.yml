# Override applied on top of docker-compose.e2e.yml (via -f) when collecting
# CORE coverage. Swaps the core for an instrumented build that writes raw LLVM
# profiles to a host-mounted directory, flushed on graceful shutdown.
#
#   docker compose -f docker-compose.e2e.yml -f docker-compose.e2e.coverage.yml up
#
# Driven by apps/e2e/scripts/core-coverage.sh (CORE_COVERAGE=1).

services:
  core:
    image: banalize-core:e2e-coverage
    build:
      dockerfile: apps/core/Dockerfile.coverage
    environment:
      LLVM_PROFILE_FILE: /cov/banalize-core-%p-%m.profraw
    volumes:
      - ./apps/e2e/.tmp/core-coverage:/cov
    # Give the binary time to flush coverage on `docker compose down`.
    stop_grace_period: 30s
